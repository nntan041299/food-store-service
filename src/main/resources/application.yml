server:
  servlet:
    context-path: /food-store-service/api
  port: 8080

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

db:
  host: ${DB_HOST}
  port: ${DB_PORT:5432}
  name: ${DB_NAME}
  username: ${DB_USERNAME}
  password: ${DB_PASSWORD}

spring:
  application:
    name: food-store-service

  datasource:
    url: jdbc:postgresql://${db.host}:${db.port}/${db.name}
    username: ${db.username}
    password: ${db.password}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 250MB

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/foodstore
    table: flyway_schema_history_store

allowed:
  urls: ${ALLOWED_ORIGIN:https://your-frontend-domain.com}

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-256-bits-long}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}    # 15 min
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days